<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Operator 1814</title>

<style>
body{
  background:#07111f;
  color:#eef4ff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.panel{
  background:#12233d;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#0b1730;
  color:white;
  border:1px solid #2c456d;
}

button{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Industrial Operator 1814</h1>

<div class="panel">
  <h3>Durum</h3>
  Üretim: <span id="prod">500</span><br>
  Lojistik: <span id="log">180</span><br>
  Moral: <span id="mor">48</span><br>
  Risk: <span id="risk">28</span>
</div>

<div class="panel">
  <h3>Serbest Karar</h3>

  <textarea id="input" placeholder="Karar yaz..."></textarea>

  <button onclick="send()">Uygula</button>
</div>

<div class="panel">
  <h3>Log</h3>
  <div id="logBox"></div>
</div>

<script>
let state = {
  production:500,
  logistics:180,
  morale:48,
  risk:28
};

function render(){
  document.getElementById("prod").textContent = state.production;
  document.getElementById("log").textContent = state.logistics;
  document.getElementById("mor").textContent = state.morale;
  document.getElementById("risk").textContent = state.risk;
}

async function send(){
  const val = document.getElementById("input").value;

  try{
    const res = await fetch("/api",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ input: val })
    });

    const data = await res.json();

    if(data.result){
      state.production += data.result.production || 0;
      state.logistics += data.result.logistics || 0;
      state.morale += data.result.morale || 0;
      state.risk += data.result.risk || 0;

      document.getElementById("logBox").innerHTML =
        "<p>"+data.result.summary+"</p>" +
        document.getElementById("logBox").innerHTML;

      render();
    }

  }catch(e){
    alert("Hata var");
  }
}

document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

render();
</script>

</body>
</html>
