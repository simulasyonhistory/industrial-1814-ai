<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Historical Operator Engine v3</title>
  <style>
    :root {
      --bg: #09111d;
      --panel: #121f34;
      --panel-2: #172841;
      --line: #294263;
      --text: #eef4ff;
      --muted: #bfd0ee;
      --good: #85efac;
      --warn: #ffd37a;
      --bad: #ff8a8a;
      --accent: #dce9ff;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #07111f 0%, #0c1830 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      background: rgba(7, 17, 31, 0.96);
    }

    .topbar {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(9, 17, 29, 0.96);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .titleRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    select, button, textarea {
      font: inherit;
      border-radius: 12px;
    }

    select {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 8px 10px;
      max-width: 180px;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .card {
      background: rgba(18, 31, 52, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
    }

    .goal {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 8px;
    }

    .blockTitle {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .statusGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .statCard {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .statCard.good { border-color: rgba(133,239,172,.4); }
    .statCard.warn { border-color: rgba(255,211,122,.4); }
    .statCard.bad { border-color: rgba(255,138,138,.4); }

    .statLabel {
      font-size: 12px;
      color: var(--muted);
    }

    .statValue {
      margin-top: 6px;
      font-size: 20px;
      font-weight: bold;
    }

    .bottleneckTitle {
      font-size: 20px;
      font-weight: bold;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .mutedText {
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .tinyStat {
      margin-top: 10px;
      font-size: 13px;
      color: var(--accent);
    }

    .stackLine {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(41,66,99,.55);
      font-size: 14px;
    }

    .stackLine:last-child { border-bottom: none; }
    .stackLine span { color: var(--muted); }
    .stackLine strong { text-align: right; }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      background: #0b1730;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 12px;
    }

    .buttonRow {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: #eef4ff;
      color: #07111f;
      font-weight: bold;
      padding: 11px 14px;
      cursor: pointer;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .deltaGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .deltaItem {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
    }

    .deltaItem span { color: var(--muted); }
    .deltaItem strong { font-size: 16px; }

    .resultText {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .aiBox {
      margin-top: 12px;
      background: #0f1d34;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .aiTitle {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .historyWrap, .logWrap {
      max-height: 260px;
      overflow: auto;
      display: grid;
      gap: 10px;
    }

    .historyItem, .logItem {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .historyBody { margin-top: 8px; display: grid; gap: 6px; color: var(--muted); font-size: 14px; }
    .logTop { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 6px; font-size: 13px; }
    .logItem.good { border-color: rgba(133,239,172,.35); }
    .logItem.warn { border-color: rgba(255,211,122,.35); }
    .logItem.bad { border-color: rgba(255,138,138,.35); }

    .footerPad {
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    @media (min-width: 900px) {
      .app {
        max-width: 1180px;
      }
      .content {
        display: grid;
        grid-template-columns: 1.2fr .8fr;
        align-items: start;
      }
      .leftCol, .rightCol {
        display: grid;
        gap: 12px;
      }
      .historyWrap, .logWrap {
        max-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="titleRow">
        <div>
          <h1 id="scenarioTitle">Historical Operator</h1>
          <div class="meta" id="headerMeta"></div>
        </div>
        <select id="scenarioSelect"></select>
      </div>
    </div>

    <div class="content footerPad">
      <div class="leftCol">
        <div class="card">
          <div class="meta" id="scenarioSubtitle"></div>
          <div class="goal"><strong>Hedef:</strong> <span id="goalText"></span></div>
          <div class="goal" id="introText"></div>
        </div>

        <div class="card">
          <div class="blockTitle">Durum Paneli</div>
          <div class="statusGrid" id="statusGrid"></div>
        </div>

        <div class="card" id="bottleneckBox"></div>
        <div class="card" id="systemShiftBox"></div>

        <div class="card">
          <div class="blockTitle">Karar</div>
          <textarea id="decisionInput" placeholder="Kararını kendi cümlenle yaz. Örn: Pompa bakımını artırıp su baskısını azaltıyorum."></textarea>
          <div class="buttonRow">
            <button id="applyBtn">Kararı uygula</button>
            <button id="exampleBtn" class="secondary">Örnek karar</button>
            <button id="resetBtn" class="secondary">Baştan başlat</button>
          </div>
          <div class="meta" id="saveInfo" style="margin-top:10px;">Autosave aktif</div>
        </div>

        <div class="card" id="resultBox"></div>
      </div>

      <div class="rightCol">
        <div class="card">
          <div class="blockTitle">Ekonomi Özeti</div>
          <div id="summaryBox"></div>
        </div>

        <div class="card">
          <div class="blockTitle">Geçmiş</div>
          <div class="historyWrap" id="historyBox"></div>
        </div>

        <div class="card">
          <div class="blockTitle">Operasyon Günlüğü</div>
          <div class="logWrap" id="logBox"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
