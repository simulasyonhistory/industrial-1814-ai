<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Operator 1814</title>

<style>
body {
  background: #0f1115;
  color: #e6f4ff;
  font-family: Arial;
  padding: 20px;
}
button {
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Industrial Operator 1814</h2>

<input id="input" style="width:100%;padding:10px;" placeholder="Karar gir..." />
<button onclick="send()">Gönder</button>

<pre id="output"></pre>

<script>
window.onerror = function(message, source, lineno) {
  document.body.innerHTML = "<pre style='color:red'>" + message + " @ " + lineno + "</pre>";
};

async function send() {
  const val = document.getElementById("input").value;

  try {
    const res = await fetch("/api", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input: val })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").textContent = err.message;
  }
}
</script>

</body>
</html>
