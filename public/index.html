<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Industrial Operator 1814</title>

<style>
body{
  margin:0;
  background:#07111f;
  color:#eef4ff;
  font-family:Arial;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.header{
  background:#12233d;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:15px;
}

.panel{
  background:#12233d;
  padding:15px;
  border-radius:12px;
}

.flow{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.node{
  background:#0b1730;
  padding:10px;
  border-radius:8px;
  text-align:center;
  flex:1;
  margin:5px;
}

.bar{
  height:8px;
  background:#2c456d;
  margin-top:5px;
}

.fill{
  height:100%;
  background:#8ef0a7;
}

textarea{
  width:100%;
  padding:10px;
  background:#0b1730;
  color:white;
  border:1px solid #2c456d;
}

button{
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}

.report{
  background:#0f1d34;
  padding:10px;
  margin-top:10px;
}

.log{
  max-height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h2>1814 Newcastle Krizi</h2>
<p>500 ton üretim var ama sadece 180 ton limana ulaşıyor.</p>
</div>

<div class="grid">

<div>

<div class="panel">
<h3>Sistem Akışı</h3>

<div class="flow">
<div class="node">Maden<br><span id="prod">500</span></div>
<div class="node">Ray Hattı<br><span id="log">180</span></div>
<div class="node">Liman</div>
</div>

</div>

<div class="panel">
<h3>Karar</h3>

<textarea id="input"></textarea>
<button onclick="send()">Uygula</button>

<div id="report" class="report">Henüz karar yok</div>

</div>

</div>

<div>

<div class="panel">
<h3>Durum</h3>

Nakit: £<span id="cash">15000</span><br>
Moral: <span id="mor">48</span><br>
Risk: <span id="risk">28</span>

</div>

<div class="panel">
<h3>Geçmiş</h3>
<div id="log" class="log"></div>
</div>

</div>

</div>

</div>

<script>

let state = {
  production:500,
  logistics:180,
  morale:48,
  risk:28,
  cash:15000
};

function format(n){
  return n.toLocaleString("tr-TR");
}

function render(){
  prod.textContent = state.production;
  log.textContent = state.logistics;
  mor.textContent = state.morale;
  risk.textContent = state.risk;
  cash.textContent = format(state.cash);
}

async function send(){

  const val = input.value;

  const res = await fetch("/api",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ input:val })
  });

  const data = await res.json();

  if(data.result){

    const before = {...state};

    state.production += data.result.production||0;
    state.logistics += data.result.logistics||0;
    state.morale += data.result.morale||0;
    state.risk += data.result.risk||0;
    state.cash += data.result.cash||0;

    report.innerHTML = `
    ${data.result.summary}<br><br>
    Üretim: ${before.production} → ${state.production}<br>
    Lojistik: ${before.logistics} → ${state.logistics}<br>
    Nakit: ${format(before.cash)} → ${format(state.cash)}
    `;

    log.innerHTML =
    `<div>${data.result.summary}</div>` + log.innerHTML;

    render();
  }

}

render();

</script>

</body>
</html>
